   function readUTCDate(dateString) {
    return dateString && new Date(Date.UTC(
      dateString.split('-')[0],
      parseInt(dateString.split('-')[1]) - 1,
      dateString.split(' ')[0].split('-')[2],
      dateString.split(' ')[1].split(':')[0],
      dateString.split(':')[1],
      dateString.split(':')[2]));
   }
   function isNumber(value) {
    return (typeof value === 'number' && !isNaN(value)) || (typeof value === 'string' && !isNaN(parseFloat(value))) || (typeof value === 'boolean');
   }
   function asNumber(value) {
    if (typeof value === 'boolean') {
      return value ? 1 : 0;
    }
    const number = parseFloat(value);
    return isNaN(number) ? undefined : number;
   }
   function round(value) {
    return Math.round(value * 100) / 100;
   }
   function getData(bucket, yyyymmddhh) {
    return axios.get(`/data.${bucket}.${yyyymmddhh}.json`)
      .catch(function () {return {data: {}}})
      .then(function (response) {
        const json = response.data;
        return json;
      })
   }
  
   function bucketContainerStart(bucket, date) {
    return bucket === 'm1'
      ? new Date(date.getFullYear(), date.getMonth(), date.getDate(), date.getHours(), 0, 0)
      : bucket === 'm5'
      ? new Date(date.getFullYear(), date.getMonth(), date.getDate(), Math.floor(date.getHours() / 4) * 4, 0, 0)
      : bucket === 'm30'
      ? new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0)
      : bucket === 'h12'
      ? new Date(date.getFullYear(), date.getMonth(), 1, 0, 0, 0)
      : null;
   }

   function padLeft(value, width = 2, padChar = '0') {
    return value.toString().padStart(width, padChar);
   }

   function loadData(fromDate, toDate) {
    const minutes = (toDate - fromDate) / 60000;
    const bucket = minutes <= 1440 ? 'm1' : minutes <= 7200 ? 'm5' : minutes <= 44640 ? 'm30' : 'h12';
    const dates = [bucketContainerStart(bucket, toDate)];
    while (dates.slice(-1)[0] > fromDate) {
      dates.push(bucketContainerStart(bucket, new Date(dates.slice(-1)[0] - 1000)));
    }
    return Promise.all(
      dates.map(date => getData(
        bucket,
        `${padLeft(date.getFullYear(), 4)}-${padLeft(date.getMonth()+1)}-${padLeft(date.getDate())}.${padLeft(date.getHours())}`
      ))
    ).then(result => result
      .flatMap(obj => {
        const keys = Object.keys(obj);
        keys.sort();
        return keys.map(key => ({...obj[key], Time: key}));
      })
    //);
    ).then(r => {r.sort(function(a,b){return a.Time<b.Time ? -1 : a.Time>b.Time ? 1 : 0;}); return r;});
   }
   function maxNumber(a,b,c) {
      if (isNumber(c)) return maxNumber(maxNumber(a,b),c);
      return isNumber(a) && isNumber(b) ?
	(asNumber(a) > asNumber(b) ? a : b) :
        isNumber(a) ?
        a :
        isNumber(b) ?
        b :
        undefined
   }
   function minNumber(a,b,c) {
      if (isNumber(c)) return minNumber(minNumber(a,b),c);
      return isNumber(a) && isNumber(b) ?
	(asNumber(a) < asNumber(b) ? a : b) :
        isNumber(a) ?
        a :
        isNumber(b) ?
        b :
        undefined
   }

   function ampToVoltageImpact(x) {
    if (!x || typeof x !== 'number') return 0;
    var positive_amp_impact = [
      .016, .015, .014, .013, .013,
      .012, .012, .012, .012, .012,
      .012, .012, .011, .011, .011,
      .011, .011, .011, .011, .011,
      .011, .011, .010, .010, .010,
      .009, .009, .009, .009, .009,
      .009, .009, .009, .009, .009,
      .009, .009, .009, .009, .009,
    ]
    var negative_amp_impact = [
      .017, .016, .015, .014, .013,
      .012, .011, .010, .010, .010,
      .010, .010, .010, .010, .009,
      .009, .009, .009, .009, .009,
      .008, .008, .008, .008, .008,
      .008, .008, .008, .008, .008,
      .008, .008, .008, .008, .008,
      .008, .008, .008, .008, .008,
    ]

    var i = 0
    var impact = 0
    while (i < positive_amp_impact.length-1) {
      var impact_increment = x < 0 ? -negative_amp_impact[i] : positive_amp_impact[i];
      if (i >= Math.abs(x)) {
        return impact + impact_increment * (Math.abs(x) - i);                
      }
      impact += impact_increment;
      i += 1;
    }

    return impact;
   }

   function estimateSoc(voltage) {
    var lookup_table = [
        [13.6, 100],
        [13.47, 99],
        [13.41, 90],
        [13.37, 80],
        [13.33, 70],
        [13.29, 60],
        [13.23, 50],
        [13.165, 40],
        [13.10, 30],
        [13.04, 20],
        [12.5, 10],
        [11.0, 0]
    ]
    var i = 0
    while (i < lookup_table.length-1) {
        if (voltage >= lookup_table[i][0])
            if (i == 0)
                return lookup_table[i][1]
            else
                return lookup_table[i][1] + ((lookup_table[i-1][1]-lookup_table[i][1]) / (lookup_table[i-1][0]-lookup_table[i][0])) * (voltage - lookup_table[i][0])
        i += 1
    }

    return 0
   }

      // drawData(data, 'Time', 'Charging from Solar', 'Green');
 
      
      // GEY (Geyserwala) graphs
      drawData2(data, 'Time', 'GEY_Tank_Temp', 'GEY_Collector_Temp', 'Orange', 'Tank Temp', 'Collector Temp');      
      drawData2(data, 'Time', 'GEY_Element_On', 'GEY_Pump_Status', 'Green', 'Element', 'Pump');

      fetch('update.txt')
        .then(function(response) {
          response.text().then(function(text) {
            text.split('\n').forEach(t => 
            d3
              .select("body")
              .append("div")
              .style("min-height", "17px")
              .append('text')
              .text(t)
            )
          });
        });

    })
   }

   function zoomOut() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('hours').value = hours * 4;
    refresh();
   }

   function zoomIn() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('hours').value = hours / 4;
    refresh();
   }

   function zoomOut1() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('hours').value = hours + 1;
    refresh();
   }

   function zoomIn1() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('hours').value = hours - 1;
    refresh();
   }

   function shiftLeft() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('to').value = to + hours / 4;
    refresh();
   }

   function shiftRight() {
    const hours = parseFloat(document.getElementById('hours').value);
    const to = parseFloat(document.getElementById('to').value);
    document.getElementById('to').value = Math.max(0, to - hours / 4);
    refresh();
   }
</script>
 </head>
 <body style="font-family: Arial, Helvetica, sans-serif; background-color: black; color: #dddddd;" onload="refresh()">
  <table style="position: sticky; top: 0px; left: 0px; font-size: larger; margin: 0 auto 15px;background-color: black;">
    <tr><td>HOURS</td><td>
      <input style="width:60px; height: 25px; font-weight: 900;" id="hours" type="number" value="6" min="0"></input>
      <button style="width:50px; height: 25px;" onclick="zoomOut1()">+1</button>
      <button style="width:50px; height: 25px;" onclick="zoomIn1()">-1</button>
      <button style="width:50px; height: 25px;" onclick="zoomOut()">x4</button>
      <button style="width:50px; height: 25px;" onclick="zoomIn()">&frac14;</button>
    </td></tr>
    <tr><td>SCROLL</td><td>
      <input style="width:60px; height: 25px; font-weight: 900;"id="to" type="number" value="0" min="0"></input>   
      <button style="width:50px; height: 25px;" onclick="shiftLeft()">&lt;&lt;</button>
      <button style="width:50px; height: 25px;" onclick="shiftRight()">&gt;&gt;</button>
      <button style="height: 25px;"onclick="refresh()">REFRESH</button>
    </td></tr>
  </table>

 </body>
</html>
